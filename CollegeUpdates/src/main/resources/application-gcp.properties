# GCP Configuration for College Updates Service
# Profile: gcp
# Use: java -jar app.jar --spring.profiles.active=gcp
# GCP Project: storied-shore-473817-v5  |  Region: us-central1

spring.application.name=college-updates
server.port=8080

# ========================================
# Eureka Configuration
# (Disabled on Cloud Run - no service registry needed)
# ========================================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Internal service URLs for Cloud Run
gcp.service.college-admin-url=${COLLEGE_ADMIN_URL:https://college-admin-324266638161.us-central1.run.app}
gcp.service.college-notifications-url=${COLLEGE_NOTIFICATIONS_URL:https://college-notifications-backend-324266638161.us-central1.run.app}

# ========================================
# MongoDB Configuration (Atlas or Firestore)
# (GCP equivalent of AWS DocumentDB)
#
# Option A: MongoDB Atlas (recommended - fully managed)
# Option B: Self-hosted MongoDB on GCE
# Option C: Use Google Cloud Firestore (NoSQL alternative)
# ========================================

# --- Option A: MongoDB Atlas ---
spring.data.mongodb.uri=${GCP_MONGODB_URI:mongodb+srv://${GCP_MONGODB_USERNAME:admin}:${GCP_MONGODB_PASSWORD}@${GCP_MONGODB_HOST:cluster0.mongodb.net}/${GCP_MONGODB_DATABASE:college_updates_db}?retryWrites=true&w=majority&tls=true&authSource=admin}
spring.data.mongodb.database=${GCP_MONGODB_DATABASE:college_updates_db}

# MongoDB Connection Pool
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uuid-representation=standard

# MongoDB Connection Advanced Settings
gcp.mongodb.connection-pool.max-size=50
gcp.mongodb.connection-pool.min-size=10
gcp.mongodb.connection-pool.max-wait-time=5000
gcp.mongodb.server-selection-timeout=30000
gcp.mongodb.connect-timeout=10000
gcp.mongodb.socket-timeout=10000

# ========================================
# GCP Secret Manager Integration
# (GCP equivalent of AWS Secrets Manager)
# ========================================
gcp.secret-manager.enabled=true
gcp.secret-manager.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
gcp.secret-manager.mongo-uri-secret=college-updates-mongodb-uri
gcp.region=us-central1

# ========================================
# GCP Managed Kafka
# (GCP equivalent of AWS MSK / DocumentDB Streams)
# ========================================
spring.kafka.bootstrap-servers=${GCP_MANAGED_KAFKA_BROKERS:localhost:9092}

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy

# Consumer Configuration
spring.kafka.consumer.group-id=college-updates-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000

# GCP Managed Kafka SASL/OAuth (Workload Identity)
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=OAUTHBEARER
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=https://oauth2.googleapis.com/token

# Topics
app.kafka.topics.news-updates=college-news-update-events
app.kafka.topics.announcements=college-announcement-events
app.kafka.topics.events=college-event-broadcast

# ========================================
# GCP Cloud Storage
# (GCP equivalent of AWS S3 - for media/attachments)
# ========================================
gcp.cloud-storage.enabled=true
gcp.cloud-storage.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
gcp.cloud-storage.bucket-name=${GCP_STORAGE_BUCKET:college-updates-media-storied-shore-473817-v5}
gcp.cloud-storage.region=us-central1
gcp.cloud-storage.signed-url-duration=3600

# ========================================
# GCP Memorystore for Redis (Cache)
# ========================================
spring.redis.host=${GCP_MEMORYSTORE_HOST:127.0.0.1}
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-wait=-1ms
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5

spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# ========================================
# GCP Cloud Logging & Cloud Monitoring
# (GCP equivalent of AWS CloudWatch + X-Ray)
# ========================================
logging.level.root=INFO
logging.level.com.updates=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework.kafka=INFO

# Cloud Monitoring Metrics Export
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.stackdriver.enabled=true
management.metrics.export.stackdriver.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
management.metrics.export.stackdriver.resource-type=generic_task
management.metrics.export.stackdriver.step=1m
management.metrics.tags.application=college-updates
management.metrics.tags.environment=gcp-production

# Actuator
management.server.port=9084
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# Application-Specific Settings
# ========================================
app.name=College Updates Service (GCP)
app.environment=production
app.version=1.0.0
app.gcp.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
app.gcp.region=us-central1
app.updates.feed.max-items=50
app.updates.feed.cache-ttl=300
