# AWS DocumentDB Configuration for College Updates Service
# Profile: aws
# Use: java -jar app.jar --spring.profiles.active=aws

spring.application.name=collegeupdates
server.port=8084

# ========================================
# AWS DocumentDB (MongoDB-compatible) Configuration
# ========================================
# Connection String Format:
# mongodb://username:password@host:port/database?options
spring.data.mongodb.uri=mongodb://${AWS_DOCDB_USERNAME:docdbadmin}:${AWS_DOCDB_PASSWORD}@${AWS_DOCDB_ENDPOINT:college-docdb-cluster.cluster-xxxxx.us-east-1.docdb.amazonaws.com}:27017/collegeDB?ssl=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false

# MongoDB Database Name
spring.data.mongodb.database=collegeDB

# SSL Configuration for DocumentDB
spring.data.mongodb.ssl.enabled=true

# Connection Pool Settings
spring.data.mongodb.connection-pool.max-size=50
spring.data.mongodb.connection-pool.min-size=10
spring.data.mongodb.connection-pool.max-wait-time=30000
spring.data.mongodb.connection-pool.max-connection-idle-time=300000
spring.data.mongodb.connection-pool.max-connection-life-time=600000

# Socket Settings
spring.data.mongodb.socket.connect-timeout=10000
spring.data.mongodb.socket.read-timeout=15000

# ========================================
# Kafka Configuration (AWS MSK)
# ========================================
spring.kafka.bootstrap-servers=${AWS_MSK_BOOTSTRAP_SERVERS:b-1.collegeprojectcluster.xxxxx.kafka.us-east-1.amazonaws.com:9098,b-2.collegeprojectcluster.xxxxx.kafka.us-east-1.amazonaws.com:9098}

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy

# Consumer Configuration
spring.kafka.consumer.group-id=college-updates-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000
spring.kafka.consumer.max-poll-records=500

# AWS MSK Security (IAM Authentication)
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=AWS_MSK_IAM
spring.kafka.properties.sasl.jaas.config=software.amazon.msk.auth.iam.IAMLoginModule required;
spring.kafka.properties.sasl.client.callback.handler.class=software.amazon.msk.auth.iam.IAMClientCallbackHandler

# SSL Configuration
spring.kafka.ssl.trust-store-location=/usr/lib/jvm/java-21-amazon-corretto/lib/security/cacerts
spring.kafka.ssl.trust-store-password=changeit

# ========================================
# AWS Secrets Manager Integration
# ========================================
aws.secretsmanager.enabled=true
aws.secretsmanager.secret-name=college-project/docdb/mongodb
aws.region=us-east-1

# ========================================
# Eureka Configuration
# ========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://172.31.16.175:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ========================================
# AWS CloudWatch Logging & Metrics
# ========================================
logging.level.root=INFO
logging.level.com.college=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN

# CloudWatch Metrics Export
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.cloudwatch.enabled=true
management.metrics.export.cloudwatch.namespace=CollegeProject/Updates
management.metrics.export.cloudwatch.step=1m
management.metrics.export.cloudwatch.batch-size=20

# Actuator Configuration
management.server.port=9084
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# Application-Specific Settings
# ========================================
app.name=College Updates Service (AWS)
app.environment=production
app.version=1.0.0
app.aws.region=us-east-1
