# GCP Cloud SQL MySQL Configuration for College Admin Service
# Profile: gcp
# Use: java -jar app.jar --spring.profiles.active=gcp
# GCP Project: storied-shore-473817-v5  |  Region: us-central1

spring.application.name=college-admin
server.port=8082

# ========================================
# GCP Cloud SQL (MySQL) Configuration
# ========================================
# Cloud SQL connection via Unix socket (recommended for Cloud Run)
# Format: /cloudsql/PROJECT:REGION:INSTANCE/DATABASE
spring.datasource.url=jdbc:mysql:///${GCP_CLOUD_SQL_DATABASE:college_system}?cloudSqlInstance=${GCP_CLOUD_SQL_INSTANCE:storied-shore-473817-v5:us-central1:college-mysql-db}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${GCP_CLOUD_SQL_USERNAME:root}
spring.datasource.password=${GCP_CLOUD_SQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Alternatively use TCP (for local dev with Cloud SQL Auth Proxy):
# spring.datasource.url=jdbc:mysql://${GCP_CLOUD_SQL_HOST:127.0.0.1}:3306/${GCP_CLOUD_SQL_DATABASE:college_system}?useSSL=false&serverTimezone=UTC

# ========================================
# Connection Pool Settings (HikariCP)
# Production Optimized
# ========================================
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=CollegeAdminHikariPool
spring.datasource.hikari.auto-commit=false
# Allow app to start even if Cloud SQL isn't reachable (for demo/staging without full Cloud SQL setup)
spring.datasource.hikari.initialization-fail-timeout=-1

# ========================================
# JPA/Hibernate Configuration
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Prevent Hibernate from querying DB metadata at startup (allows startup without Cloud SQL)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ========================================
# GCP Secret Manager Integration
# (GCP equivalent of AWS Secrets Manager)
# ========================================
gcp.secret-manager.enabled=true
gcp.secret-manager.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
gcp.secret-manager.db-password-secret=college-admin-db-password
gcp.region=us-central1

# ========================================
# GCP Memorystore for Redis
# (GCP equivalent of AWS ElastiCache)
# ========================================
spring.redis.host=${GCP_MEMORYSTORE_HOST:127.0.0.1}
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-wait=-1ms
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.time-to-live=600000

# ========================================
# Eureka Configuration
# (Disabled on Cloud Run - services communicate via HTTPS URLs)
# ========================================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Internal service URLs for Cloud Run
gcp.service.college-notifications-url=${COLLEGE_NOTIFICATIONS_URL:https://college-notifications-backend-324266638161.us-central1.run.app}
gcp.service.college-updates-url=${COLLEGE_UPDATES_URL:https://college-updates-backend-324266638161.us-central1.run.app}

# ========================================
# GCP Pub/Sub (Kafka-compatible messaging)
# (GCP equivalent of AWS MSK/Kafka)
# ========================================
spring.kafka.bootstrap-servers=${GCP_MANAGED_KAFKA_BROKERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy

spring.kafka.consumer.group-id=college-admin-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000
spring.kafka.consumer.max-poll-records=500

# GCP Managed Kafka SASL/OAuth (Workload Identity)
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=OAUTHBEARER
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=https://oauth2.googleapis.com/token

# ========================================
# GCP Cloud Logging & Cloud Monitoring
# (GCP equivalent of AWS CloudWatch)
# ========================================
logging.level.root=INFO
logging.level.com.college=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=INFO

# Cloud Monitoring Metrics Export (via Micrometer / Prometheus scraping)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.stackdriver.enabled=true
management.metrics.export.stackdriver.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
management.metrics.export.stackdriver.resource-type=generic_task
management.metrics.export.stackdriver.step=1m

# Actuator Configuration
management.server.port=9081
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# GCP AI Platform / Vertex AI
# (GCP equivalent of AWS SageMaker)
# ========================================
gcp.vertex-ai.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
gcp.vertex-ai.location=us-central1
gcp.vertex-ai.endpoint-name=${GCP_VERTEX_AI_ENDPOINT:student-sentiment-analyzer}
gcp.vertex-ai.model-name=${GCP_VERTEX_AI_MODEL:student-recommendation-model}

# ========================================
# Application-Specific Settings
# ========================================
app.name=College Admin Service (GCP)
app.environment=production
app.version=1.0.0
app.gcp.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
app.gcp.region=us-central1
