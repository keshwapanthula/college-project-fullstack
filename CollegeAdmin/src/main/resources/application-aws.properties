# AWS RDS MySQL Configuration for College Admin Service
# Profile: aws
# Use: java -jar app.jar --spring.profiles.active=aws

spring.application.name=college-admin
server.port=8082

# ========================================
# AWS RDS MySQL Database Configuration
# ========================================
spring.datasource.url=jdbc:mysql://${AWS_RDS_ENDPOINT:college-mysql-db.xxxxx.us-east-1.rds.amazonaws.com}:3306/college_system?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${AWS_RDS_USERNAME:admin}
spring.datasource.password=${AWS_RDS_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# Connection Pool Settings (HikariCP)
# Production Optimized
# ========================================
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=CollegeAdminHikariPool
spring.datasource.hikari.auto-commit=false

# ========================================
# JPA/Hibernate Configuration
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ========================================
# AWS Secrets Manager Integration
# ========================================
aws.secretsmanager.enabled=true
aws.secretsmanager.secret-name=college-project/rds/mysql
aws.region=us-east-1

# ========================================
# AWS ElastiCache for Redis
# (Replace with ElastiCache endpoint when available)
# ========================================
spring.redis.host=${AWS_ELASTICACHE_ENDPOINT:localhost}
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-wait=-1ms
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.time-to-live=600000

# ========================================
# Eureka Configuration
# ========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://172.31.16.175:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ========================================
# AWS CloudWatch Logging & Metrics
# ========================================
logging.level.root=INFO
logging.level.com.college=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=INFO

# CloudWatch Metrics Export
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.cloudwatch.enabled=true
management.metrics.export.cloudwatch.namespace=CollegeProject/Admin
management.metrics.export.cloudwatch.step=1m
management.metrics.export.cloudwatch.batch-size=20

# Actuator Configuration
management.server.port=9081
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# Kafka Configuration (AWS MSK)
# Will integrate in Step 2
# ========================================
spring.kafka.bootstrap-servers=${AWS_MSK_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ========================================
# Application-Specific Settings
# ========================================
app.name=College Admin Service (AWS)
app.environment=production
app.version=1.0.0
