# GCP Configuration for College Notifications Service
# Profile: gcp
# Use: java -jar app.jar --spring.profiles.active=gcp
# GCP Project: storied-shore-473817-v5  |  Region: us-central1

spring.application.name=college-notifications
server.port=8083

# ========================================
# Eureka Configuration
# (Disabled on Cloud Run - no service registry needed)
# ========================================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Internal service URLs for Cloud Run
gcp.service.college-admin-url=${COLLEGE_ADMIN_URL:https://college-admin-324266638161.us-central1.run.app}
gcp.service.college-updates-url=${COLLEGE_UPDATES_URL:https://college-updates-backend-324266638161.us-central1.run.app}

# ========================================
# GCP Managed Kafka / Pub/Sub Bootstrap
# (GCP equivalent of AWS MSK)
# ========================================
spring.kafka.bootstrap-servers=${GCP_MANAGED_KAFKA_BROKERS:localhost:9092}

# Consumer Configuration
spring.kafka.consumer.group-id=college-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000
spring.kafka.consumer.max-poll-records=500

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.compression-type=snappy

# GCP Managed Kafka SASL/OAuth authentication (Workload Identity)
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=OAUTHBEARER
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=https://oauth2.googleapis.com/token

# Kafka Topics
app.kafka.topics.student-enrollment=student-enrollment-events
app.kafka.topics.course-updates=course-update-events
app.kafka.topics.grade-notifications=grade-notification-events
app.kafka.topics.graduation-alerts=graduation-alert-events

# ========================================
# GCP Secret Manager Integration
# (GCP equivalent of AWS Secrets Manager)
# ========================================
gcp.secret-manager.enabled=true
gcp.secret-manager.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
gcp.secret-manager.email-api-key-secret=college-notifications-email-api-key
gcp.secret-manager.sms-api-key-secret=college-notifications-sms-api-key
gcp.region=us-central1

# ========================================
# Email Notification Configuration
# SMTP via GCP or SendGrid
# ========================================
spring.mail.host=${GCP_SMTP_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${GCP_SMTP_USERNAME:noreply@college.edu}
spring.mail.password=${GCP_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================================
# GCP Memorystore for Redis (Cache)
# (GCP equivalent of AWS ElastiCache)
# ========================================
spring.redis.host=${GCP_MEMORYSTORE_HOST:127.0.0.1}
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=10
spring.redis.jedis.pool.max-wait=-1ms
spring.redis.jedis.pool.max-idle=5
spring.redis.jedis.pool.min-idle=2

# Cache for notification deduplication
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# ========================================
# GCP Cloud Logging & Cloud Monitoring
# (GCP equivalent of AWS CloudWatch)
# ========================================
logging.level.root=INFO
logging.level.com.notifications=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN

# Cloud Monitoring Metrics Export
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.stackdriver.enabled=true
management.metrics.export.stackdriver.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
management.metrics.export.stackdriver.resource-type=generic_task
management.metrics.export.stackdriver.step=1m
management.metrics.tags.application=college-notifications
management.metrics.tags.environment=gcp-production

# Actuator Configuration
management.server.port=9083
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# Application-Specific Settings
# ========================================
app.name=College Notifications Service (GCP)
app.environment=production
app.version=1.0.0
app.gcp.project-id=${GCP_PROJECT_ID:storied-shore-473817-v5}
app.gcp.region=us-central1

# Notification retry configuration
app.notification.retry.max-attempts=3
app.notification.retry.backoff-delay=1000
app.notification.batch-size=100
